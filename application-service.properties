# ===== AUTH SERVICE =====
server.port=8081
spring.application.name=auth-service

# ===== MySQL Database =====
spring.datasource.url=jdbc:mysql://localhost:3306/finflow_auth?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=Babal1111
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
# Secret key same honi chahiye Gateway mein bhi - warna token verify nahi hoga
jwt.secret=qwertyuiop123456789qwertyuiop123456789
jwt.expiration=86400000
# 86400000 milliseconds = 24 hours

# Eureka Client config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
