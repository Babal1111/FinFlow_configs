# ===== API GATEWAY =====
server.port=8080

spring.application.name=api-gateway

# Routes configuration
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/gateway/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[1].id=application-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/gateway/applications/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[2].id=document-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/gateway/documents/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[3].id=admin-service
spring.cloud.gateway.routes[3].uri=http://localhost:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/gateway/admin/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

# Added Documentation Routes
spring.cloud.gateway.routes[4].id=auth-docs
spring.cloud.gateway.routes[4].uri=http://localhost:8081
spring.cloud.gateway.routes[4].predicates[0]=Path=/gateway/auth/v3/api-docs
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[5].id=application-docs
spring.cloud.gateway.routes[5].uri=http://localhost:8082
spring.cloud.gateway.routes[5].predicates[0]=Path=/gateway/applications/v3/api-docs
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[6].id=document-docs
spring.cloud.gateway.routes[6].uri=http://localhost:8083
spring.cloud.gateway.routes[6].predicates[0]=Path=/gateway/documents/v3/api-docs
spring.cloud.gateway.routes[6].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[7].id=admin-docs
spring.cloud.gateway.routes[7].uri=http://localhost:8084
spring.cloud.gateway.routes[7].predicates[0]=Path=/gateway/admin/v3/api-docs
spring.cloud.gateway.routes[7].filters[0]=StripPrefix=1

# Global CORS - Frontend se requests allow karne ke liye
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*

# JWT Secret - Auth Service wala SAME secret yahan bhi daalo
jwt.secret=qwertyuiop123456789qwertyuiop123456789

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG

# Springdoc Swagger UI Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/gateway/auth/v3/api-docs
springdoc.swagger-ui.urls[1].name=Application Service
springdoc.swagger-ui.urls[1].url=/gateway/applications/v3/api-docs
springdoc.swagger-ui.urls[2].name=Document Service
springdoc.swagger-ui.urls[2].url=/gateway/documents/v3/api-docs
springdoc.swagger-ui.urls[3].name=Admin Service
springdoc.swagger-ui.urls[3].url=/gateway/admin/v3/api-docs

# Eureka Client config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
