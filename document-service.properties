# ===== DOCUMENT SERVICE =====
server.port=8083
spring.application.name=document-service

# ===== MySQL Database =====
spring.datasource.url=jdbc:mysql://localhost:3306/document_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=Babal1111
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
# ===== File Upload =====
# Documents yahan store honge local disk pe
app.upload.dir=./uploads/documents
# Max file size 5MB
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ===== Other Services URLs =====
application.service.url=http://localhost:8082

# Eureka Client config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
